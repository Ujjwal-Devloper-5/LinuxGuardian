# ═══════════════════════════════════════════════════════════════
#  SystemBackup — File/Directory Importance Weights
#  Used by the AI smart file change detection module.
#  Format: path:weight (1-10, higher = more important)
#  Paths are matched as prefixes.
# ═══════════════════════════════════════════════════════════════

# ── Critical System Configuration ─────────────────────────────
/etc:10
/boot:10

# ── User Security Keys ───────────────────────────────────────
.ssh:10
.gnupg:10
.config/rclone:9

# ── User Documents & Projects ────────────────────────────────
Documents:9
Projects:9
Work:9

# ── System Databases ─────────────────────────────────────────
/var/lib/postgresql:9
/var/lib/mysql:9
/var/lib/mongodb:9
/var/lib/redis:8

# ── User Configuration ───────────────────────────────────────
.config:7
.local/share:6
.bashrc:8
.zshrc:8
.profile:8
.gitconfig:7

# ── Desktop Files ────────────────────────────────────────────
Desktop:6
Pictures:6
Music:5

# ── Downloads (low priority — usually re-downloadable) ───────
Downloads:3

# ── Logs (lowest priority) ───────────────────────────────────
/var/log:2

# ── Temporary / Unimportant ──────────────────────────────────
/tmp:1
.cache:1
